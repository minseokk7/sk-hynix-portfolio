name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Inject Secrets (Prepending method)
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Create a dynamic config header
          echo "const SUPABASE_URL = '$SB_URL';" > config_header.js
          echo "const SUPABASE_ANON_KEY = '$SB_KEY';" >> config_header.js
          
          # 2. Prepend the header to script.js
          cat config_header.js script.js > script_new.js
          mv script_new.js script.js
          
          # 3. Final verification
          head -n 5 script.js
          if ! grep -q "const SUPABASE_URL =" script.js; then
            echo "::error::Injection failed! Config header is missing."
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
